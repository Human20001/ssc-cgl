<!dcotype html>
    <html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>ssc cgl 2026</title>

    </head>

    <body>
        <header>
            <h1 class="card">SSC CGL 2026</h1>
        </header>
        <main>
            <div>
                <h2 class="card">subjects</h2>
                <ul id="subjects" class="card">
                    <li><a href="english.html">English</a></li>
                    <li><a href="quantitative-aptitude.html">Aptitude</a></li>
                    <li><a href="general-intelligence-and-reasoning.html">Reasoning</a></li>
                    <li><a href="general-awareness.html">General Awareness</a></li>
                </ul>
            </div>
            <div class="card target">
                <p>SSC CGL 2026 Target</p>
            </div>
            <section >
                <div class=" card">
                    <h1>📝 My To-Do List</h1>
                    <div class="input-section">
                        <input type="text" id="taskInput" placeholder="Enter a new task...">
                        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
                    </div>
                    <ul id="taskList"></ul>
                </div>
            </section>
        </main>
        <script>
            // Create a To-Do List object
         // script.js
function addTask() {
  const taskInput = document.getElementById("taskInput");
  const taskText = taskInput.value.trim();

  if (taskText === "") return;

  const li = document.createElement("li");
  li.textContent = taskText;

  // Toggle done on click
  li.addEventListener("click", () => {
    li.classList.toggle("done");
  });

  // Remove button
  const removeBtn = document.createElement("button");
  removeBtn.textContent = "X";
  removeBtn.className = "remove-btn";
  removeBtn.onclick = () => li.remove();

  li.appendChild(removeBtn);
  document.getElementById("taskList").appendChild(li);

  taskInput.value = "";
}


        </script>
    </body>

    </html>
